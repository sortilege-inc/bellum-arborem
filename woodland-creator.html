<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woodland Creator — Bellum Arborem</title>
<link rel="stylesheet" href="css/app.css">
<style>

  .steps { display:flex; flex-wrap:wrap; gap:6px; margin:16px 0 22px; }
  .step-pip {
    font-family:'Bitter',serif; font-size:12.5px; font-weight:600; letter-spacing:.3px;
    padding:6px 12px; border-radius:20px; border:1px solid var(--line);
    background:var(--card-lo); color:var(--ink-soft); cursor:pointer; white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .step-pip .n { font-family:'Bree Serif',serif; font-size:12px; opacity:.7; }
  .step-pip.active { background:linear-gradient(180deg,var(--eyrie),var(--eyrie-dk)); color:var(--cream-hi); border-color:var(--eyrie-dk); }
  .step-pip.done { color:var(--alliance-dk); border-color:var(--alliance); }
  .step-pip.done .n::after { content:" ✓"; }

  .step-body h2 { margin:0 0 4px; font-size:26px; }
  .step-intro { color:var(--ink-soft); margin:0 0 18px; max-width:70ch; }
  .rule-note { border-left:3px solid var(--line); padding:2px 0 2px 12px; margin:0 0 18px; color:var(--ink-soft); font-size:14px; font-style:italic; }
  .navbtns { display:flex; justify-content:space-between; margin-top:26px; gap:12px; }

  /* Roll rows */
  .roll { display:flex; align-items:center; gap:12px; background:var(--cream-hi); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:10px; flex-wrap:wrap; }
  .roll .rlabel { font-family:'Bitter',serif; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); min-width:120px; }
  .roll .rvalue { font-family:'Bree Serif',serif; font-size:18px; color:var(--rust); flex:1; min-width:90px; }
  .roll .dcount { font-family:'Bitter',serif; font-size:12px; color:var(--ink-faint); }
  .dice { font-family:'Bitter',serif; font-weight:600; font-size:13px; cursor:pointer; border:1px solid var(--line); background:var(--card); border-radius:6px; padding:5px 11px; color:var(--ink); white-space:nowrap; }
  .dice:hover { border-color:var(--accent); background:#fbf0dd; }
  .dice.primary { background:linear-gradient(180deg,var(--accent),var(--accent-dk)); color:var(--cream-hi); border-color:var(--accent-dk); }

  .clist { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .crow { display:flex; align-items:center; gap:10px; background:var(--cream-hi); border:1px solid var(--line-soft); border-radius:var(--radius-sm); padding:8px 12px; flex-wrap:wrap; }
  .crow .cnum { font-family:'Bree Serif',serif; color:var(--ink-faint); width:22px; }
  .crow .cname { font-family:'Bree Serif',serif; font-size:15px; min-width:130px; flex:1; }
  .crow input[type=text].nm { max-width:170px; }
  .crow .comm { min-width:96px; }
  .crow .pths { width:56px; text-align:center; }
  .crow .rm { color:var(--rust); cursor:pointer; border:none; background:none; font-size:16px; }

  .badge { display:inline-block; font-family:'Bitter',serif; font-weight:700; font-size:11px; letter-spacing:.5px; padding:3px 9px; border-radius:20px; }
  .badge.yes { background:rgba(78,124,62,.18); color:var(--alliance-dk); border:1px solid rgba(78,124,62,.4); }
  .badge.no  { background:rgba(107,99,87,.14); color:var(--vagabond); border:1px solid rgba(107,99,87,.35); }
  .badge.roost { background:rgba(47,110,160,.16); color:var(--eyrie-dk); border:1px solid rgba(47,110,160,.4); }

  .fx-clearing { border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:12px; background:var(--cream-hi); }
  .fx-clearing h4 { margin:0 0 8px; font-family:'Bree Serif',serif; font-size:16px; }
  .fx-row { display:flex; align-items:center; gap:8px; margin:5px 0; flex-wrap:wrap; }
  .fx-row .fx-lbl { font-family:'Bitter',serif; font-weight:700; font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--ink-soft); min-width:92px; }

  table.review-tbl { width:100%; border-collapse:collapse; font-size:13.5px; }
  table.review-tbl th, table.review-tbl td { text-align:left; padding:7px 9px; border-bottom:1px solid var(--line-soft); vertical-align:top; }
  table.review-tbl th { font-family:'Bitter',serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--accent-dk); }
  .tbl-scroll { overflow-x:auto; }

  /* SVG map */
  .mapsec { margin-top:8px; }
  .mapwrap {
    border:1px solid var(--line); border-radius:var(--radius); padding:6px;
    background:
      radial-gradient(120% 120% at 50% 0%, #f0e8ce 0%, #e7d9b6 70%, #ddcaa0 100%);
    box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 8px 18px -14px var(--shadow-deep);
    overflow:hidden;
  }
  .mapwrap.review { margin-top:8px; }
  svg.woodmap { width:100%; height:auto; display:block; touch-action:none; user-select:none; }
  svg.woodmap .edge { stroke:#8a6f45; stroke-width:4; stroke-linecap:round; opacity:.8; }
  svg.woodmap .node { cursor:pointer; }
  svg.woodmap .node:active { cursor:grabbing; }
  svg.woodmap .ico { font-size:30px; pointer-events:none; }
  svg.woodmap .nm {
    font-family:'Bree Serif',serif; font-size:17px; fill:var(--ink);
    paint-order:stroke; stroke:#f6efd9; stroke-width:3.5px; stroke-linejoin:round; pointer-events:none;
  }
  svg.woodmap .deg { font-family:'Bitter',serif; font-size:15px; font-weight:700; fill:var(--ink-soft); pointer-events:none; }
  svg.woodmap .deg.ok { fill:var(--alliance-dk); }
  svg.woodmap .mark { font-size:17px; fill:var(--ink); pointer-events:none; }
  svg.woodmap .selring { stroke:var(--accent); }
  .map-toolbar { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; align-items:center; }
  .map-legend { display:flex; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--ink-soft); align-items:center; }
  .map-legend span { display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
  .lgdot { width:14px; height:14px; border-radius:50%; display:inline-block; border:1px solid rgba(60,40,20,.35); }

</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="home" href="index.html">← Woodland</a>
    <div class="actions">
      <input type="file" id="importFile" accept="application/json,.json" class="hidden">
      <button class="btn ghost small" id="importBtn">Import…</button>
      <button class="btn small" id="exportBtn" disabled>Export JSON</button>
    </div>
  </div>

  <header style="margin-bottom:6px">
    <h1 class="crest" style="font-size:clamp(30px,5.5vw,46px);margin-bottom:2px">The Woodland Creator</h1>
    <p class="subtitle">Bellum Arborem · Making the Woodland</p>
  </header>

  <nav class="steps" id="steps"></nav>

  <div class="panel">
    <div class="step-body" id="stepBody"></div>
    <div class="navbtns">
      <button class="btn ghost" id="backBtn">← Back</button>
      <button class="btn" id="nextBtn">Next →</button>
    </div>
  </div>

  <footer>
    <p>Fan-made companion for <em>Root: The Roleplaying Game</em> by Magpie Games.
       You draw the map; the Woodland Creator rolls the tables.</p>
  </footer>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="data/woodland-rules.js"></script>
<script src="js/common.js"></script>
<script src="js/woodland.js"></script>
</body>
</html>
