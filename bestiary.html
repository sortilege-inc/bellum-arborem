<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestiary — Bellum Arborem</title>
<link rel="stylesheet" href="css/app.css">
<style>

  .search { width:100%; max-width:340px; }

  /* Combat tracker */
  .tracker { display:flex; flex-direction:column; gap:12px; }
  .inst { border:1px solid var(--line); border-radius:var(--radius); background:var(--card); padding:14px 16px; }
  .inst .ihead { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .inst .ilabel { font-family:'Bree Serif',serif; font-size:17px; flex:1; min-width:120px; }
  .inst input.ilabel { max-width:220px; }
  .inst .rm { color:var(--rust); cursor:pointer; border:none; background:none; font-size:16px; }
  .trk { margin:8px 0 0; }
  .trk .tl { display:flex; justify-content:space-between; align-items:baseline; }
  .trk .tn { font-family:'Bitter',serif; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); }
  .trk .tc { font-family:'Bitter',serif; font-weight:700; font-size:12px; color:var(--ink-soft); }
  .boxes { display:flex; flex-wrap:wrap; gap:5px; margin:5px 0 2px; }
  .box { width:28px; height:28px; border:2px solid var(--line); border-radius:5px; cursor:pointer; background:var(--cream-hi); }
  .box.on-exhaustion { background:#caa63f; border-color:#a8842a; }
  .box.on-injury { background:var(--rust); border-color:#8a2c1a; }
  .box.on-wear { background:#6b6357; border-color:#4a443a; }
  .box.on-morale { background:#5b3a8a; border-color:#432a66; }
  .box.on-other { background:#2c6b66; border-color:#1f4d49; }

  /* Bestiary cards */
  .mcard { border:1px solid var(--line); border-radius:var(--radius); background:linear-gradient(180deg,var(--card),var(--card-lo)); padding:16px 18px; margin-bottom:14px; }
  .mcard h3 { margin:0 0 2px; font-family:'Bree Serif',serif; font-size:20px; color:var(--rust); }
  .mcard .harm { font-family:'Bitter',serif; font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--marquise-dk); margin:0 0 8px; }
  .sb { border:1px solid var(--line-soft); border-radius:var(--radius-sm); background:var(--cream-hi); padding:8px 12px; margin:6px 0; }
  .sb .sbv { font-family:'Bree Serif',serif; font-size:14px; }
  .sb .sbt { font-size:13.5px; color:var(--ink-soft); }
  .lbl3 { font-family:'Bitter',serif; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--accent-dk); margin:12px 0 4px; }
  .trait { font-size:13.5px; margin:3px 0; }
  .trait b { color:var(--ink); }
  .mmoves { margin:4px 0 0 18px; font-size:13.5px; }
  .mdesc { font-size:13.5px; line-height:1.5; color:var(--ink-soft); white-space:pre-wrap; }
  details.mdet > summary { cursor:pointer; font-family:'Bitter',serif; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); margin:10px 0 6px; }

</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="home" href="index.html">← Woodland</a>
    <input type="text" id="search" class="search" placeholder="Search the bestiary…">
  </div>

  <header style="margin-bottom:6px">
    <h1 class="crest" style="font-size:clamp(28px,5vw,44px);margin-bottom:2px">The Bestiary</h1>
    <p class="subtitle">Bellum Arborem · great beasts of the Woodland</p>
  </header>

  <div id="app"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="data/root-rules.js"></script>
<script src="js/common.js"></script>
<script src="js/bestiary.js"></script>
</body>
</html>
